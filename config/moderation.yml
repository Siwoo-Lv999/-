categories:
  explicit_sexual:
    response: "노골적인 성적 요청에는 답할 수 없습니다, 선생님. 다른 주제로 이야기하죠."
    patterns:
      - '(?:노골적(?:인|으로)?|상세한)\s*(?:성행위|성적\s*행위|섹스)\s*(?:묘사|대화|소설|방법|장면)'
      - '(?:성행위|섹스)\s*(?:하는\s*)?(?:방법|자세|과정).{0,12}(?:자세히|구체적으로|알려)'

  hate_or_severe_harassment:
    response: "누군가를 심각하게 해치거나 모욕하는 요청은 도와드릴 수 없습니다, 선생님."
    patterns:
      - '(?:여성|남성|장애인|외국인|흑인|백인|동성애자|무슬림|기독교인).{0,20}(?:열등|박멸|죽여|없애|혐오)'
      - '(?:인종|민족|성별|장애|종교).{0,20}(?:죽여|박멸|공격)'
      - '(?:특정|저)\s*(?:사람|놈|년).{0,15}(?:자살하게|죽도록\s*괴롭|신상\s*털)'

  realistic_threat_or_danger:
    response: "현실에서 누군가를 다치게 할 수 있는 방법은 알려드릴 수 없습니다, 선생님."
    patterns:
      - '(?:폭탄|사제\s*폭발물|독극물)\s*(?:을|를)?\s*(?:만드는|제조하는|구하는)\s*(?:방법|법)'
      - '(?:사람|누군가|친구|선생|직장\s*동료).{0,20}(?:죽이는|살해하는|납치하는)\s*(?:방법|계획)'
      - '(?:학교|회사|집).{0,20}(?:폭파|테러).{0,20}(?:방법|계획)'
